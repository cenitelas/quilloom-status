server {
    server_name status.quilloom.com;

    root /opt/quilloom-status/public;
    index index.html;

    # Never cache the JSON feed or the HTML — we want live updates.
    location = /incidents.json {
        add_header Cache-Control "no-store" always;
        try_files $uri =404;
    }

    location = / {
        add_header Cache-Control "no-store" always;
        try_files /index.html =404;
    }

    location = /index.html {
        add_header Cache-Control "no-store" always;
    }

    # Gatus JSON API (component statuses + historical results).
    # Cached so the heavy /statuses?pageSize=131000 request is paid by one
    # client per minute, not every visitor.
    location /api/ {
        proxy_cache status_cache;
        proxy_cache_key "$scheme$request_method$host$request_uri";
        proxy_cache_valid 200 60s;
        proxy_cache_lock on;
        proxy_cache_use_stale updating error timeout http_500 http_502 http_503 http_504;
        proxy_cache_background_update on;
        add_header X-Cache-Status $upstream_cache_status always;

        proxy_pass http://127.0.0.1:8082/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location / {
        try_files $uri $uri/ =404;
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/status.quilloom.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/status.quilloom.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    if ($host = status.quilloom.com) {
        return 301 https://$host$request_uri;
    }
    listen 80;
    server_name status.quilloom.com;
    return 404;
}
